name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/jwt-backend ./exp2-jwt-protected-routes/server

      - name: Build Frontend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/jwt-frontend ./exp2-jwt-protected-routes/client

      - name: Push Backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/jwt-backend

      - name: Push Frontend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/jwt-frontend